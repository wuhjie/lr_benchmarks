paths:
  seed_file: QueryGeneration/topic_seeds_stratified.jsonl
  prompt_file: QueryGeneration/pasa_prompts.yaml
  output_file: QueryGeneration/output/pasa_query_records.jsonl
  trace_file: QueryGeneration/output/pasa_generation_trace.jsonl
  report_file: QueryGeneration/output/pasa_generation_report.json
  cache_file: QueryGeneration/output/pasa_llm_cache.jsonl

llm:
  api_key_env: OPENAI_API_KEY
  base_url_env: OPENAI_BASE_URL
  batch_base_url_env: OPENAI_BATCH_BASE_URL
  model_env: OPENAI_MODEL
  model: qwen-max
  temperature: 0.2
  mode: batch_chat
  batch_base_url: https://batch.dashscope.aliyuncs.com/compatible-mode/v1

runtime:
  max_rewrite_attempts: 1
  resume: true
