# Qdrant config for Paper Search API (binary deployment)
# Usage: ./qdrant --config-path config/qdrant_config.yaml
# Run from project root: /data/wdy/Paper_Search_API

log_level: INFO

storage:
  storage_path: ./corpus/qdrant_storage
  snapshots_path: ./corpus/qdrant_storage/snapshots
  on_disk_payload: true

service:
  host: 0.0.0.0
  http_port: 6333
  grpc_port: 6334

cluster:
  enabled: false

telemetry_disabled: true
